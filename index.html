<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComedyForge</title>
    <link rel="stylesheet" href="public/styles.css">
</head>

<body>
    <div class="container">
        <h1>ComedyForge</h1>
        <p class="subtitle">Generate scenes, unleash chaos, and explore characters.</p>

        <div class="button-group">
            <button id="sceneBtn">Generate Scene</button>
            <button id="chaosBtn">Chaos Mode</button>
            <button id="charactersBtn">Show Characters</button>
        </div>

        <div id="output" class="output-box"></div>
        <div id="characters" class="characters-grid"></div>
    </div>

    <script src="public/frontend.js"></script>
</body>
</html>
